version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5.2.0
  # aws-s3: circleci/aws-s3@4.1.1
  aws-s3: circleci/aws-s3@3.0
  node: circleci/node@7.0.0
  
commands:
  build-and-deploy:
    parameters:
      to:
        type: string
        default: 's3://feedthemonster-development'
      build-script:
        type: string
        default: 'build:prod'
    steps:
      - checkout
      - run: sudo npm install -g npm@latest
      - node/install-packages
      - run: npm run << parameters.build-script >>
      # - aws-cli/setup:
      #     aws_access_key_id: AWS_ACCESS_KEY
      #     region: AWS_DEFAULT_REGION
      #     aws_secret_access_key: AWS_SECRET_ACCESS_KEY
      - aws-s3/sync:
          arguments: |
            --acl public-read \
            --cache-control "max-age=86400"
          aws-access-key-id: AWS_ACCESS_KEY
          aws-region: AWS_DEFAULT_REGION
          aws-secret-access-key: AWS_SECRET_ACCESS_KEY
          from: ./build/
          to: << parameters.to >>
  invalidate-cloudfront-cache:
    parameters:
      distribution-id:
        type: string
        default: ''
      paths:
        type: string
        default: '"/*"'
    steps:
      - aws-cli/setup:
          aws_access_key_id: $AWS_ACCESS_KEY
          region: $AWS_DEFAULT_REGION
          aws_secret_access_key: $AWS_SECRET_ACCESS_KEY
      - run: cat ~/.aws/credentials
      - run: >
          aws cloudfront create-invalidation
          --distribution-id << parameters.distribution-id >>
          --paths << parameters.paths >>

jobs:
  build-and-deploy-dev:
    docker:
      - image: cimg/python:3.13.2-node
    steps:
      - build-and-deploy:
          to: 's3://feedthemonster-development'
          build-script: 'build:dev'

  build-and-deploy-test:
    docker:
      - image: cimg/python:3.13.2-node
    steps:
      - build-and-deploy:
          to: 's3://globallit-aws-s3-static-webapp-test-us-east-2/feed-the-monster'
          build-script: 'build:test'

  build-and-deploy-release:
    docker:
      - image: cimg/python:3.13.2-node
    steps:
      - build-and-deploy:
          to: 's3://globallit-aws-s3-static-webapp-test-us-east-2/feed-the-monster-release'
          build-script: 'build:test'

  build-and-deploy-prod:
    docker:
      - image: cimg/python:3.13.2-node
    steps:
      - build-and-deploy:
          to: 's3://feedthemonster-production'
          build-script: 'build:prod'

  invalidate-cloudfront-cache-prod:
    docker:
      - image: cimg/python:3.13.2-node
    steps:
      - invalidate-cloudfront-cache:
          distribution-id: 'E2QD6IZIYBGTJK'
          paths: '"/*"'

  e2e-tests:
    docker:
      - image: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - checkout
      - node/install-packages
      - run:
          name: Run Playwright E2E tests
          command: npm run test:e2e
          environment:
            CI: 'true'
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: playwright-report
      - store_artifacts:
          path: test-results

# TODO: move invalidate-cloudfront-cache parameters to project env variables
# Eventually these will be the new cloudfront name for apps and app name respectively.


# http://curious-reader-books-production.s3-website.ap-south-1.amazonaws.com/

workflows:
  s3-deploy-workflow:
    jobs:
      - node/test
      - e2e-tests:
          requires:
            - node/test
      - build-and-deploy-dev:
          context:
            - aws-context
          requires:
            - node/test
            - e2e-tests
          filters:
            branches:
              only:
                - develop
      - build-and-deploy-test:
          context:
            - aws-context
          requires:
            - node/test
            - e2e-tests
          filters:
            branches:
              only:
                - test
      - build-and-deploy-release:
          context:
            - aws-context
          requires:
            - node/test
            - e2e-tests
          filters:
            branches:
              only:
                - /.*epic.*/
      - build-and-deploy-prod:
          context:
            - aws-context
          requires:
            - node/test
            - e2e-tests
          filters:
            branches:
              only:
                - main
      - invalidate-cloudfront-cache-prod:
          requires:
            - build-and-deploy-prod
